<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Portal - Ugnayan</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="logo">Ugnayan</div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="messages">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </button>
                <button class="nav-tab" data-tab="announcements">
                    <i class="fas fa-bullhorn"></i> <span>Announcements</span>
                </button>
                <button class="nav-tab" data-tab="feedback">
                    <i class="fas fa-comment-alt"></i> <span>Feedback</span>
                </button>
            </div>
            <div class="user-profile">
                <div class="avatar">JD</div>
            </div>
        </nav>

        <main class="content-area">
            <!-- Messages Tab -->
            <section id="messages-tab" class="tab-content">
                <div class="section-header">
                    <h2>My Conversations</h2>
                    <button id="new-msg-btn" class="btn-primary"><i class="fas fa-plus"></i> New Message</button>
                </div>
                <div id="messages-grid" class="grid-layout">
                    <!-- Message cards will be populated here -->
                </div>
            </section>

            <!-- Announcements Tab -->
            <section id="announcements-tab" class="tab-content hidden">
                <div class="section-header">
                    <h2>Barangay Announcements</h2>
                </div>
                <div id="announcements-grid" class="grid-layout">
                    <!-- Announcement cards will be populated here -->
                </div>
            </section>

            <!-- Feedback Tab -->
            <section id="feedback-tab" class="tab-content hidden">
                <div class="feedback-container">
                    <div class="feedback-form-card">
                        <h2>Submit Feedback</h2>
                        <p>Your feedback helps us improve our services.</p>
                        <form id="feedback-form">
                            <div class="form-group">
                                <label>Rating</label>
                                <div class="star-rating">
                                    <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                                    <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                                    <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                                    <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                                    <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="fb-category">Category</label>
                                <select id="fb-category" required>
                                    <option value="General">General Feedback</option>
                                    <option value="Service">Barangay Service</option>
                                    <option value="Infrastructure">Infrastructure</option>
                                    <option value="Health">Health Services</option>
                                    <option value="Security">Security/Peace & Order</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="fb-comment">Your Comments</label>
                                <textarea id="fb-comment" rows="4" placeholder="Tell us more..." required></textarea>
                            </div>
                            <button type="submit" class="btn-primary btn-block">Submit Feedback</button>
                        </form>
                    </div>
                    <div class="feedback-history">
                        <h3>My Recent Feedback</h3>
                        <div id="feedback-list">
                            <!-- Feedback items will be populated here -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Message Detail Modal -->
    <div id="msg-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Conversation</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div id="modal-chat-history" class="chat-history">
                <!-- Chat bubbles -->
            </div>
            <div class="modal-footer">
                <div class="reply-box">
                    <input type="text" id="modal-reply-input" placeholder="Type a reply...">
                    <button id="modal-send-btn" class="btn-send"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Message Modal -->
    <div id="new-msg-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Message to Admin</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="new-msg-form" class="p-4">
                <div class="form-group">
                    <label for="msg-subject">Subject</label>
                    <input type="text" id="msg-subject" placeholder="What is this about?" required>
                </div>
                <div class="form-group">
                    <label for="msg-body">Message</label>
                    <textarea id="msg-body" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Send Message</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
